# Set DATABASE_URL in .env to Neon to use hosted Postgres; the local `db` service is optional then.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autrifix
      POSTGRES_PASSWORD: autrifix
      POSTGRES_DB: autrifix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autrifix -d autrifix"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput || true &&
             daphne -b 0.0.0.0 -p 8000 autrifix.asgi:application"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: autrifix
      POSTGRES_USER: autrifix
      POSTGRES_PASSWORD: autrifix
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHANNEL_REDIS_URL: redis://redis:6379/3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build: .
    command: celery -A autrifix worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: autrifix
      POSTGRES_USER: autrifix
      POSTGRES_PASSWORD: autrifix
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - db
      - redis

volumes:
  pgdata:
