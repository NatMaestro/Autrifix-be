name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

defaults:
  run:
    working-directory: autrifix-be

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: autrifix
          POSTGRES_PASSWORD: autrifix
          POSTGRES_DB: autrifix
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U autrifix -d autrifix"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: autrifix-be/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Environment
        run: |
          echo "DJANGO_SETTINGS_MODULE=autrifix.settings.test" >> $GITHUB_ENV
          echo "SECRET_KEY=ci-not-for-production-use-only-32chars" >> $GITHUB_ENV
          echo "DEBUG=True" >> $GITHUB_ENV
          echo "POSTGRES_HOST=localhost" >> $GITHUB_ENV
          echo "POSTGRES_PORT=5432" >> $GITHUB_ENV
          echo "POSTGRES_DB=autrifix" >> $GITHUB_ENV
          echo "POSTGRES_USER=autrifix" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=autrifix" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379/0" >> $GITHUB_ENV
          echo "CHANNEL_REDIS_URL=redis://localhost:6379/3" >> $GITHUB_ENV
          echo "CELERY_BROKER_URL=redis://localhost:6379/1" >> $GITHUB_ENV
          echo "CELERY_RESULT_BACKEND=redis://localhost:6379/2" >> $GITHUB_ENV
          echo "ALLOWED_HOSTS=localhost,127.0.0.1" >> $GITHUB_ENV

      - name: Migrate
        run: python manage.py migrate --noinput

      - name: Run tests
        run: pytest --cov=apps --cov-report=term-missing --cov-fail-under=0 -v
